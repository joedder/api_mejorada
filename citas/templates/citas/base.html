<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aplicación de Doctores{% endblock %}</title>
    {% block css %}{% endblock %}
</head>
<body class="app-body">
    <div class="page-shell">
        <header class="site-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px;">
            <div class="logo">
                <a href="{% url 'dashboard' %}" style="text-decoration: none; color: inherit;"><strong style="font-size: 1.2rem;">Clínica Azul</strong></a>
            </div>
            <div class="user-nav">
                {% if user.is_authenticated %}
                    <span style="margin-right: 15px;">Bienvenido, {{ user.name }}</span>
                    <a href="{% url 'logout' %}" class="button button-secondary" style="padding: 5px 10px; font-size: 0.9rem;">Cerrar sesión</a>
                {% endif %}
            </div>
            {% block header %}{% endblock %}
        </header>

        {% block notifications %}{% endblock %}

        <main class="site-main">
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <p>© 2026 Clínica Azul</p>
        </footer>
    </div>
</body>
</html>
